apiVersion: v1
kind: ServiceAccount
metadata:
  name: AGENT_MEMORY_NAME
  labels:
    chart: agent-memory-0.1.0
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: AGENT_MEMORY_NAME-config
data:
  NEO4J_URI: "bolt://neo4j:7687"
  NEO4J_USER: "neo4j"
  NEO4J_PASSWORD: "password"
  QDRANT_URL: "qdrant:6334"
  HTTP_PORT: ":8080"
  AUTH_ENABLED: "false"
---
apiVersion: v1
kind: Service
metadata:
  name: AGENT_MEMORY_NAME
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  selector:
    app: agent-memory
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: AGENT_MEMORY_NAME
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-memory
  template:
    metadata:
      labels:
        app: agent-memory
    spec:
      serviceAccountName: AGENT_MEMORY_NAME
      containers:
        - name: agent-memory
          image: agent-memory:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: AGENT_MEMORY_NAME-config
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
