<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="700" height="320" fill="url(#bg)" rx="12"/>
  
  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" fill="#fff" font-family="Inter, sans-serif" font-size="16" font-weight="600">Memory Flow</text>
  
  <!-- Step 1: Input -->
  <rect x="30" y="60" width="120" height="60" rx="8" fill="#1f2937" stroke="#6366f1" stroke-width="2"/>
  <text x="90" y="88" text-anchor="middle" fill="#fff" font-family="Inter, sans-serif" font-size="13" font-weight="600">Content Input</text>
  <text x="90" y="106" text-anchor="middle" fill="#9ca3af" font-family="Inter, sans-serif" font-size="10">Text, Chat, Documents</text>
  
  <!-- Arrow 1 -->
  <path d="M155 90 L185 90" stroke="#6366f1" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Step 2: Extraction -->
  <rect x="190" y="60" width="120" height="60" rx="8" fill="#4f46e5"/>
  <text x="250" y="88" text-anchor="middle" fill="#fff" font-family="Inter, sans-serif" font-size="13" font-weight="600">LLM Extraction</text>
  <text x="250" y="106" text-anchor="middle" fill="#e0e7ff" font-family="Inter, sans-serif" font-size="10">Facts · Entities · Importance</text>
  
  <!-- Arrow 2 -->
  <path d="M315 90 L345 90" stroke="#6366f1" stroke-width="2" fill="none"/>
  
  <!-- Step 3: Routing -->
  <rect x="350" y="60" width="120" height="60" rx="8" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="410" y="88" text-anchor="middle" fill="#fff" font-family="Inter, sans-serif" font-size="13" font-weight="600">Memory Router</text>
  <text x="410" y="106" text-anchor="middle" fill="#9ca3af" font-family="Inter, sans-serif" font-size="10">Type Classification</text>
  
  <!-- Arrow 3 -->
  <path d="M475 90 L505 90" stroke="#6366f1" stroke-width="2" fill="none"/>
  
  <!-- Step 4: Storage -->
  <rect x="510" y="60" width="120" height="60" rx="8" fill="#1f2937" stroke="#27c93f" stroke-width="2"/>
  <text x="570" y="88" text-anchor="middle" fill="#fff" font-family="Inter, sans-serif" font-size="13" font-weight="600">Storage</text>
  <text x="570" y="106" text-anchor="middle" fill="#9ca3af" font-family="Inter, sans-serif" font-size="10">Neo4j + Qdrant</text>
  
  <!-- Horizontal divider -->
  <line x1="50" y1="150" x2="650" y2="150" stroke="#374151" stroke-width="1" stroke-dasharray="4"/>
  
  <!-- Retrieval section label -->
  <text x="350" y="175" text-anchor="middle" fill="#6b7280" font-family="Inter, sans-serif" font-size="12" font-weight="500">RETRIEVAL</text>
  
  <!-- Step 5: Query -->
  <rect x="190" y="190" width="120" height="60" rx="8" fill="#1f2937" stroke="#f59e0b" stroke-width="2"/>
  <text x="250" y="218" text-anchor="middle" fill="#fff" font-family="Inter, sans-serif" font-size="13" font-weight="600">Query Input</text>
  <text x="250" y="236" text-anchor="middle" fill="#9ca3af" font-family="Inter, sans-serif" font-size="10">Search · Recall</text>
  
  <!-- Arrow 4 -->
  <path d="M315 220 L345 220" stroke="#f59e0b" stroke-width="2" fill="none"/>
  
  <!-- Step 6: Search -->
  <rect x="350" y="190" width="120" height="60" rx="8" fill="#d97706"/>
  <text x="410" y="218" text-anchor="middle" fill="#fff" font-family="Inter, sans-serif" font-size="13" font-weight="600">Hybrid Search</text>
  <text x="410" y="236" text-anchor="middle" fill="#fef3c7" font-family="Inter, sans-serif" font-size="10">Vector + Graph</text>
  
  <!-- Arrow 5 -->
  <path d="M475 220 L505 220" stroke="#f59e0b" stroke-width="2" fill="none"/>
  
  <!-- Step 7: Results -->
  <rect x="510" y="190" width="120" height="60" rx="8" fill="#1f2937" stroke="#27c93f" stroke-width="2"/>
  <text x="570" y="218" text-anchor="middle" fill="#fff" font-family="Inter, sans-serif" font-size="13" font-weight="600">Ranked Results</text>
  <text x="570" y="236" text-anchor="middle" fill="#9ca3af" font-family="Inter, sans-serif" font-size="10">Reranked + Relevant</text>
  
  <!-- Compression label at bottom -->
  <rect x="280" y="275" width="140" height="30" rx="15" fill="#6366f1" opacity="0.2"/>
  <text x="350" y="295" text-anchor="middle" fill="#a5b4fc" font-family="Inter, sans-serif" font-size="11">85% Compression</text>
</svg>